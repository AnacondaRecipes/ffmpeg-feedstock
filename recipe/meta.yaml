{% set version = "3.4.2" %}

package:
  name: ffmpeg
  version: {{ version }}

source:
  url: https://ffmpeg.org/releases/ffmpeg-{{ version }}.tar.gz  # [not win]
  sha256: 6ed03b00404a3923e3c2f560248a9c9ad79fbaaee26d723f74aae6b31fe2bae6  # [not win]

  url: https://ffmpeg.zeranoe.com/builds/win32/shared/ffmpeg-{{ version }}-win32-shared.zip  # [win32]
  sha256: 58f091d8fafbb15631226fa6c2023e8f8c83efaad5a4fedf1ff8a4d0626a3b30  # [win32]

  url: https://ffmpeg.zeranoe.com/builds/win64/shared/ffmpeg-{{ version }}-win64-shared.zip  # [win64]
  sha256: 03731faabc5bec2e13ad6079e26a246c087934c1b3cf7fad80e7723d8f8a23f2  # [win64]


build:
  number: 0
  # The windows build is repacking binaries rather than building from source
  skip: True  # [win]
  run_exports:
    # seems to be minor version compatibility
    # https://abi-laboratory.pro/tracker/timeline/ffmpeg/
    - {{ pin_subpackage('ffmpeg', max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - curl >=7.44.0,<8         # [win]
    - 7za                      # [win]
  host:
    - pkg-config  # [not win]
    - libtool     # [not win]
    - bzip2       # [not win]
    - zlib        # [not win]
    - libiconv    # [osx]
    - yasm
    - libvpx      # [not win]
    - libopus     # [not win]
    - freetype     # [not win]
    - gnutls       # [not win]
    - x264         # [not win and GPL_ok==1]
    # used for sha256 within bld.bat?
    # - openssl      # [win]
  run:
    - x264         # [not win and GPL_ok==1]

test:
  commands:
    - ffmpeg --help
    - ffmpeg -codecs | grep "DEVI.S zlib"  # [unix]
    - ffmpeg -protocols | grep "https"  # [not win]
    # Verify dynamic libraries on all systems
    {% set ffmpeg_libs = [
        "avcodec",
        "avdevice",
        "swresample",
        "avfilter",
        "swresample",
        "avcodec",
        "avformat",
        "swscale",
    ] %}
    {% for each_ffmpeg_lib in ffmpeg_libs %}
    - test -f $PREFIX/lib/lib{{ each_ffmpeg_lib }}.dylib  # [osx]
    - test -f $PREFIX/lib/lib{{ each_ffmpeg_lib }}.so     # [linux]
    {% endfor %}
    - conda inspect linkages -p $PREFIX ffmpeg  # [not win]
    - conda inspect objects -p $PREFIX ffmpeg  # [osx]

about:
  home: http://www.ffmpeg.org/
  license: GPL 3               # [GPL_ok == 1]
  license_file: COPYING.GPLv3  # [GPL_ok == 1]
  license: LGPL 2.1            # [GPL_ok == 0]
  license_family: LGPL         # [GPL_ok == 0]
  license_file: COPYING.LGPLv2.1
  summary: Cross-platform solution to record, convert and stream audio and video.
  dev_url: https://ffmpeg.org/developer.html
  doc_url: https://ffmpeg.org/documentation.html

extra:
  recipe-maintainers:
    - danielballan
    - jakirkham
    - 183amir
    - caspervdw
    - patricksnape
    - ocefpaf
    - sdvillal
    - carlodri
